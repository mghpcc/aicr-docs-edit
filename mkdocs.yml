site_name: AICR Documentation
site_url: https://www.mghpcc.org/
nav:
  - Home: index.md
  - AICR System: system-description.md
  - Requesting Access: request-access.md #include prerequisites
  - Getting Started: getting-started.md
  - Files and Filesystem:
    - Overview: filesystem-overview.md
    - Transferring data: transferring-data.md # include Globus
  - Software: software.md
  - Running Jobs: basic-slurm.md
  - Recipes:
    - Snapshots: restoring-data.md
  - Getting Help: getting-help.md
  - Acceptable Use: acceptable-use.md
  - Acknowledging AICR: acknowledging-aicr.md
  - About: about.md #This documentation is created by the teams at [these places], list links to pages we’ve borrowed from
  - Index: tags.md

theme: 
  name: material
#  logo: images/ORCD_logo_icononly.png
  features:
    - content.code.copy
    - content.tabs.link
#  palette:
#    primary: blue grey
plugins:
  - search
  - tags:
      tags_file: tags.md
  - git-revision-date-localized
  - open-in-new-tab
  - table-reader
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true 
  - admonition
  - pymdownx.details
  - toc:
      permalink: True
  - attr_list
  - admonition
copyright: <a href="https://accessibility.mit.edu/">Accessibility</a>
