site_name: Mkdocs Template
site_url: https://squidfunk.github.io/mkdocs-material/
nav:
  - Home: index.md 
  - Index: tags.md

theme: 
  name: material
#  logo: images/ORCD_logo_icononly.png
  features:
    - content.code.copy
    - content.tabs.link
#  palette:
#    primary: blue grey
plugins:
  - search
  - tags:
      tags_file: tags.md
  - git-revision-date-localized
  - open-in-new-tab
  - table-reader
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true 
  - admonition
  - pymdownx.details
  - toc:
      permalink: True
  - attr_list
  - admonition
copyright: <a href="https://accessibility.mit.edu/">Accessibility</a>
