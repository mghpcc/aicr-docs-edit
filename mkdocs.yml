  - AICR System: system-description.md
  - Requesting Access: request-access.md #include prerequisites
  - Getting Started: getting-started.md
  - Logging In:
    - OnDemand: connecting/ondemand.md
    - SSH: connecting/ssh.md
  - Files and Filesystem:
    - Overview: files/overview.md
    - Transferring data: files/transferring-data.md
  - Software: software.md
  - Running Jobs:
    - Slurm Basics: running-jobs/slurm-basics.md
    - GPU Jobs: running-jobs/gpu-jobs.md
    - CPU Jobs: running-jobs/cpu-jobs.md
#    - Job Arrays: running-jobs/job-arrays.md
    - Monitoring: running-jobs/monitoring.md
#    - Troubleshooting: running-jobs/troubleshooting.md
  - Recipes:
    - Snapshots: restoring-data.md
    - PyTorch on GPUs - I: recipes/pytorch-gpu.md
    - PyTorch on GPUs - II: recipes/pytorch-gpu-advanced.md
  - Getting Help: getting-help.md
  - Acceptable Use: acceptable-use.md
  - Acknowledging AICR: acknowledging-aicr.md
  - About: about.md #This documentation is created by the teams at [these places], list links to pages we’ve borrowed from
  - Index: tags.md

theme: 
  name: material
#  logo: images/ORCD_logo_icononly.png
  features:
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - navigation.top
    - navigation.path
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
plugins:
  - search
  - tags:
      tags_file: tags.md
  - git-revision-date-localized
  - open-in-new-tab
  - table-reader
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true 
  - admonition
  - pymdownx.details
  - toc:
      permalink: True
  - attr_list
  - def_list
  - tables
  - md_in_html

extra_css:
  - stylesheets/extra.css